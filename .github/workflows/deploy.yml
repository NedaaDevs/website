name: Publish image
on:
  push:
    branches:
      - 'prod'
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PUBLIC_RYBBIT_HOST=${{ vars.PUBLIC_RYBBIT_HOST }}
            PUBLIC_RYBBIT_SITE_ID=${{ vars.PUBLIC_RYBBIT_SITE_ID }}
            PUBLIC_CROWDIN_PROJECT_URL=${{ vars.PUBLIC_CROWDIN_PROJECT_URL }}
            PUBLIC_NEDAA_API=${{ vars.PUBLIC_NEDAA_API }}

      # - name: Trigger Deployment Update
      #   run: |
      #     curl -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" ${{ secrets.DEPLOY_ENDPOINT }}
