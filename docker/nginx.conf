# Agents sending `Accept: text/markdown` get the prebuilt .md twin.
map $http_accept $md_ext {
    default           "";
    "~*text/markdown" ".md";
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # `.md` is registered in the global type map (see Dockerfile). Append the
  # charset only to markdown responses; HTML/CSS/JS keep their own handling.
  charset utf-8;
  charset_types text/markdown;

  # Serve precompressed assets if the client supports it; fall back to on-the-fly gzip.
  gzip_static on;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain text/css text/xml application/javascript
    application/json application/xml application/xml+rss
    image/svg+xml font/woff2;

  # Hashed Astro assets — long-cache, immutable
  location /_astro/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Fonts and images — long but mutable
  location ~* \.(woff2|woff|ttf|otf|png|jpg|jpeg|webp|avif|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # HTML — short cache + revalidate. Serves the .md twin when the client
  # accepts text/markdown and a twin exists; HTML otherwise.
  location / {
    add_header Cache-Control "public, max-age=0, s-maxage=300, stale-while-revalidate=86400" always;
    add_header Vary "Accept" always;
    add_header Link '</llms.txt>; rel="describedby"' always;
    try_files $uri$md_ext $uri/index$md_ext $uri $uri/ $uri.html /index.html;
  }

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
