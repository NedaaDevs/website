server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve precompressed assets if the client supports it; fall back to on-the-fly gzip.
  gzip_static on;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain text/css text/xml application/javascript
    application/json application/xml application/xml+rss
    image/svg+xml font/woff2;

  # Hashed Astro assets — long-cache, immutable
  location /_astro/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Fonts and images — long but mutable
  location ~* \.(woff2|woff|ttf|otf|png|jpg|jpeg|webp|avif|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # HTML — short cache + revalidate
  location / {
    add_header Cache-Control "public, max-age=0, s-maxage=300, stale-while-revalidate=86400";
    try_files $uri $uri/ $uri.html /index.html;
  }

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
